{% extends 'base.html' %}

{% block content %}

<section class="auth-shell admin-shell">
    <div class="admin-login-card mx-auto">
        <div class="admin-login-head">
            <h3>Login</h3>
        </div>

        {% if error %}
        <div class="alert alert-danger mt-3">{{ error }}</div>
        {% endif %}

        <form method="POST" class="mt-3" autocomplete="off">
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ next|default:'' }}">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" 
                    name="username" 
                    class="form-control" 
                    placeholder="Username" 
                    autocomplete="off" 
                    required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" 
                    name="password" 
                    class="form-control" 
                    placeholder="Enter password" 
                    autocomplete="off" 
                    data-lpignore="true" 
                    required>
            </div>
            <button type="submit" class="btn btn-primary w-100 auth-btn">Login to Admin Portal</button>
        </form>
    </div>
</section>

{% endblock %}
